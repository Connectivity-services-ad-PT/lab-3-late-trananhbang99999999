openapi: 3.0.3
info:
  title: Smart Campus - AI Vision Service API
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
servers:
  - url: http://localhost:4010
paths:
  /vision/detect:
    post:
      tags:
        - Vision
      summary: Detect image
      operationId: detectImage
      description: Send an image for AI-based detection.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageType, rawData]
              properties:
                imageType: { type: string }
                rawData: { type: string }
                confidenceThreshold: { type: number }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  predictions: { type: array, items: { type: object } }
                  modelVersion: { type: string, example: "v1" }
        '400': { description: "Bad Request" }
        '401': { description: "Unauthorized" }
        '422': { description: "Unprocessable Entity" }
  /access/check:
    post:
      tags:
        - Health
      summary: Smoke test connection
      operationId: checkAccess
      description: Check if the service is reachable.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "ok" }