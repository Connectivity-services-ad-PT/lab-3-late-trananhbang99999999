openapi: 3.1.0
info:
  title: Smart Campus — IoT Ingestion API
  version: 0.3.0
  description: "Contract mẫu dùng cho FIT4110 Lab 03."
  contact:
    name: API Support
    email: support@example.com
servers:
  - url: http://localhost:4010
    description: Prism mock server
tags:
  - name: readings
    description: Sensor telemetry ingestion
  - name: system
    description: Health and runtime information
paths:
  /health:
    get:
      tags: [system]
      operationId: getHealth
      summary: Kiểm tra trạng thái service
      description: "Public health check dùng để kiểm tra mock/service đã sẵn sàng."
      responses:
        "200":
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /readings:
    post:
      tags: [readings]
      operationId: createReading
      summary: Gửi một bản ghi cảm biến
      description: "Endpoint nhận telemetry từ ESP32."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SensorReadingCreate"
      responses:
        "201":
          description: Đã ghi nhận bản đọc cảm biến
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorReadingCreated"

  /readings/latest:
    get:
      tags: [readings]
      operationId: getLatestReadings
      summary: Lấy bản ghi mới nhất
      description: "Trả về danh sách bản ghi mới nhất."
      responses:
        "200":
          description: Danh sách bản ghi mới nhất
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SensorReading"

components:
  schemas:
    SensorMetric:
      type: string
      enum: [temperature, humidity, motion, smoke]
    SensorReadingCreate:
      type: object
      required: [device_id, metric, value, timestamp]
      properties:
        device_id: { type: string }
        metric: { $ref: "#/components/schemas/SensorMetric" }
        value: { type: number }
        timestamp: { type: string, format: date-time }
    SensorReading:
      type: object
      properties:
        reading_id: { type: string }
    SensorReadingCreated:
      type: object
      required: [reading_id]
      properties:
        reading_id: { type: string }
    HealthResponse:
      type: object
      properties:
        status: { type: string }
        service: { type: string }
        version: { type: string }